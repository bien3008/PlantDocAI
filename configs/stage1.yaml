# ─────────────────────────────────────────────────────────────────
# configs/stage1.yaml
# Stage 1: Domain-specific pretraining trên PlantVillage (core classes)
#
# Mục đích: Chuyển trọng số từ ImageNet sang miền "nông nghiệp/thực vật",
# giúp mạng CNN học các bộ lọc nhận diện gân lá, đốm bệnh, hoại tử.
# ─────────────────────────────────────────────────────────────────

experimentName: "two_stage_s1"
dataDir: "data/extended/plantVillage/train"
splitDir: "data/splits/two_stage/stage1"
outputDir: "artifacts/two_stage_s1"

modelName: "mobilenetv2_100"
imageSize: 224
freezeBackbone: false

# Thông số chuẩn hóa (ImageNet)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

batchSize: 32
numEpochs: 15
learningRate: 0.001
weightDecay: 0.0001
numWorkers: 2
topK: 3
device: "auto"

# ── Class imbalance ──────────────────────────────────────────────
useWeightedSampler: true
useClassWeights: false

# ── Augmentation (giữ giống baseline — bảo thủ cho Stage 1) ─────
augmentation:
  rotationDegrees: 180
  cropScaleMin: 0.70
  cropScaleMax: 1.00
  hflip: true
  vflip: true
  elasticEnabled: true
  elasticAlpha: 30.0
  elasticSigma: 5.0
  elasticP: 0.30
  brightnessJitter: 0.25
  contrastJitter: 0.20
  saturationJitter: 0.10
  hueJitter: 0.00
  blurEnabled: true
  blurKernelMin: 3
  blurKernelMax: 5
  blurSigmaMin: 0.1
  blurSigmaMax: 1.0
  blurP: 0.20
  sharpnessEnabled: true
  sharpnessFactor: 1.5
  sharpnessP: 0.20
  eraseEnabled: true
  eraseScaleMin: 0.02
  eraseScaleMax: 0.08
  eraseRatio: 1.0
  eraseP: 0.20
  coarseDropoutEnabled: true
  coarseDropoutMaxHoles: 6
  coarseDropoutHoleHeight: 16
  coarseDropoutHoleWidth: 16
  coarseDropoutP: 0.30
  gaussNoiseEnabled: true
  gaussNoiseVarMin: 5.0
  gaussNoiseVarMax: 25.0
  gaussNoiseP: 0.25
  grayscaleP: 0.05
