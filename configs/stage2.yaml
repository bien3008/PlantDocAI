# ─────────────────────────────────────────────────────────────────
# configs/stage2.yaml
# Stage 2: Fine-tune trên PlantDoc (ảnh thực địa, core classes)
#
# Mục đích: Buộc mô hình "quên" nền lab đơn sắc của PlantVillage
# và tập trung vào tổn thương thật sự trên ảnh chụp ngoài đời thực.
#
# Quan trọng:
#   - Dùng pretrainedCheckpoint để load trọng số Stage 1
#   - Learning rate thấp hơn (1e-4) để fine-tune nhẹ nhàng
#   - freezeBackbone: true ban đầu, chỉ train classifier head
# ─────────────────────────────────────────────────────────────────

experimentName: "two_stage_s2"
dataDir: "data/extended/PlantDoc_Dataset_master/train"
splitDir: "data/splits/two_stage/stage2"
outputDir: "artifacts/two_stage_s2"

# Đã loại bỏ Stage 1 theo kế hoạch chống Negative Transfer.
# Mô hình sẽ load trọng số từ ImageNet để học trực tiếp trên PlantDoc.
pretrainedCheckpoint: null

modelName: "mobilenetv2_100"
imageSize: 224

# Do học thẳng từ ImageNet (chưa quen với bệnh lá), chúng ta cần rã đông mạng
# ngay từ đầu để nó học các đặc trưng mới, với LR = 1e-4.
freezeBackbone: false

# Thông số chuẩn hóa (ImageNet — giữ nguyên)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

batchSize: 16
numEpochs: 40
learningRate: 0.0001
weightDecay: 0.0001
numWorkers: 2
topK: 3
device: "auto"

# ── Early Stopping ───────────────────────────────────────────────
earlyStoppingPatience: 7
earlyStoppingMinDelta: 0.005

# ── Class imbalance ──────────────────────────────────────────────
# PlantDoc nhỏ hơn PV nhiều, sampler rất cần thiết.
useWeightedSampler: true
useClassWeights: false

# ── Augmentation (mạnh hơn Stage 1 — dữ liệu ít, cần diversity) ─
augmentation:
  rotationDegrees: 180
  cropScaleMin: 0.65
  cropScaleMax: 1.00
  hflip: true
  vflip: true
  elasticEnabled: false
  elasticAlpha: 30.0
  elasticSigma: 5.0
  elasticP: 0.35
  brightnessJitter: 0.30
  contrastJitter: 0.25
  saturationJitter: 0.15
  hueJitter: 0.00  # KHÔNG ĐƯỢC THAY ĐỔI
  blurEnabled: true
  blurKernelMin: 3
  blurKernelMax: 5
  blurSigmaMin: 0.1
  blurSigmaMax: 1.0
  blurP: 0.25
  sharpnessEnabled: true
  sharpnessFactor: 1.5
  sharpnessP: 0.25
  eraseEnabled: false
  eraseScaleMin: 0.02
  eraseScaleMax: 0.10
  eraseRatio: 1.0
  eraseP: 0.25
  coarseDropoutEnabled: false
  coarseDropoutMaxHoles: 8
  coarseDropoutHoleHeight: 16
  coarseDropoutHoleWidth: 16
  coarseDropoutP: 0.35
  gaussNoiseEnabled: false
  gaussNoiseVarMin: 5.0
  gaussNoiseVarMax: 30.0
  gaussNoiseP: 0.30
  grayscaleP: 0.05
