experimentName: "baseline"
dataDir: "data/PlantVillage/train"
splitDir: "data/splits"
outputDir: "artifacts/baseline"

modelName: "mobilenetv2_100"
imageSize: 224
freezeBackbone: false

# Normalization parameters (Default: ImageNet)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

batchSize: 32
numEpochs: 5
learningRate: 0.001
weightDecay: 0.0001
numWorkers: 2
topK: 3
device: "auto"
