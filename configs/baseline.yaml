experimentName: "mobilenetV2Baseline"
dataDir: "data/extended/train"
splitDir: "data/splits"
outputDir: "artifacts/mobilenetV2Baseline"

modelName: "mobilenetv2_100"
imageSize: 224
freezeBackbone: false

# Thông số chuẩn hóa (Mặc định: ImageNet)
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

batchSize: 32
numEpochs: 5
learningRate: 0.001
weightDecay: 0.0001
numWorkers: 2
topK: 3
device: "auto"

# ─────────────────────────────────────────────────────────────────
# Class imbalance handling
# ─────────────────────────────────────────────────────────────────
# Dùng WeightedRandomSampler cho train DataLoader để oversample class thiểu số.
useWeightedSampler: true

# Có thể bật thêm class weights cho CrossEntropyLoss (thường thì dùng sampler là đủ)
useClassWeights: false

# ─────────────────────────────────────────────────────────────────
# Cấu hình Augmentation
# Tất cả giá trị ánh xạ trực tiếp tới các trường AugConfig
# trong src/data/dataTransforms.py
# ─────────────────────────────────────────────────────────────────
augmentation:

  # ── Hình học ───────────────────────────────────────────────────
  # Xoay 180°: hướng lá hoàn toàn ngẫu nhiên trong ảnh thực địa.
  # Có thể tăng lên 360 nếu muốn — an toàn về mặt sinh học.
  rotationDegrees: 180

  # Scale của RandomResizedCrop: 0.70 đảm bảo không crop mất tổn thương.
  # KHÔNG giảm xuống dưới 0.60 — nguy cơ cắt mất tổn thương trên lá nhỏ.
  cropScaleMin: 0.70
  cropScaleMax: 1.00

  # Flip ngang và dọc: lá bị lật vẫn là cùng một loại bệnh.
  hflip: true
  vflip: true

  # Biến dạng đàn hồi: mô phỏng độ cong / nhăn của bề mặt lá.
  # Yêu cầu albumentations. Đặt elasticEnabled: false nếu chưa cài.
  elasticEnabled: true
  elasticAlpha: 30.0   # biên độ dịch chuyển — giữ thấp để không phá hình dạng tổn thương
  elasticSigma: 5.0    # hệ số làm mượt
  elasticP: 0.30       # áp dụng 30% thời gian

  # ── Màu sắc ────────────────────────────────────────────────────
  brightnessJitter: 0.25   # biến động ánh sáng thực địa — phạm vi an toàn
  contrastJitter: 0.20     # biến động do mây che / bóng râm — phạm vi an toàn
  saturationJitter: 0.10   # dịch chuyển white-balance camera — giữ bảo thủ

  # !!! TUYỆT ĐỐI KHÔNG ĐẶT hueJitter KHÁC 0 !!!
  # Màu sắc bệnh (vàng lá úa, đốm nâu tổn thương, đốm đỏ) là tín hiệu
  # chẩn đoán cốt lõi. Thay đổi hue tổng hợp ra mẫu không hợp lệ về y học.
  hueJitter: 0.00

  # ── Làm mờ ─────────────────────────────────────────────────────
  # Mô phỏng rung tay / ẩm ướt trên ống kính khi chụp ảnh thực địa.
  blurEnabled: true
  blurKernelMin: 3      # phải là số lẻ; 3 = mờ nhẹ nhất có thể
  blurKernelMax: 5      # giữ nhỏ — bảo toàn chi tiết texture tổn thương
  blurSigmaMin: 0.1
  blurSigmaMax: 1.0
  blurP: 0.20           # xác suất 20% — hầu hết ảnh giữ nguyên độ sắc nét

  # ── Độ sắc nét ─────────────────────────────────────────────────
  # Mô phỏng output camera thực địa độ phân giải cao (nhấn mạnh cạnh bệnh).
  sharpnessEnabled: true
  sharpnessFactor: 1.5   # 1.0 = không đổi, >1 = sắc hơn
  sharpnessP: 0.20

  # ── Xóa vùng nhỏ ───────────────────────────────────────────────
  # Xóa một vùng cực nhỏ (2–8% ảnh) với fill màu xám trung tính (value=0).
  # Mục đích: ngăn model ghi nhớ patch texture nền cụ thể.
  # Scale được giữ cực nhỏ — đây KHÔNG phải RandomErasing thông thường cho
  # regularization (patch lớn có nguy cơ che tổn thương duy nhất trên lá nhỏ).
  eraseEnabled: true
  eraseScaleMin: 0.02   # 2% diện tích ảnh — rất nhỏ
  eraseScaleMax: 0.08   # tối đa 8% diện tích ảnh — vẫn còn nhỏ
  eraseRatio: 1.0       # chỉ patch vuông (dự đoán được)
  eraseP: 0.20
  
  # ── Anti background shortcuts ──────────────────────────────────
  coarseDropoutEnabled: true
  coarseDropoutMaxHoles: 6
  coarseDropoutHoleHeight: 16
  coarseDropoutHoleWidth: 16
  coarseDropoutP: 0.30
  
  gaussNoiseEnabled: true
  gaussNoiseVarMin: 5.0
  gaussNoiseVarMax: 25.0
  gaussNoiseP: 0.25
  
  grayscaleP: 0.05
